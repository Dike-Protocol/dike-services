name: Deploy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            APP_DIR='${{ secrets.EC2_APP_DIR }}'
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/dike-services"
            fi
            cd "$APP_DIR"
            git fetch --prune origin
            git checkout main
            git checkout -- scripts/deploy-ec2.sh || true
            git pull --ff-only origin main
            chmod +x scripts/deploy-ec2.sh
            APP_DIR="$APP_DIR" ./scripts/deploy-ec2.sh
